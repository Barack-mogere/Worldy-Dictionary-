<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <header class="header">
    <img src="logo.png" alt="logo.png">
   </header>
   <section class="discover">
    <h2>
        Discover words.Expand your world.
    </h2>
    <p>
        Search for any word to see its meaning,pronounciation and more.
    </p>
    <section id="Search">
          <input type="search"   id="searchInput"  placeholder="Search...">
        <button type="submit" id="searchBtn">Search</button>

    </section>
    <section class="content">
        <div class="div1" id="result">
          <h2>Search a word</h2>

              <p>
                 The definition will appear here.
                </p>

        </div>
        <div class="div2">
            <h4>
                Your saved words
            </h4>
           <ul id="savedWords"></ul>

        </div>
    </section>

   </section>
  <script src="script.js"></script>
</body>
       
</html>
